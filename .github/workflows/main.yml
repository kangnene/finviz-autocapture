name: Daily Market Data Capture

on:
  schedule:
    # 매일 한국 시간 오전 9시 (UTC 00시)
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  capture:
    # 최신 버전의 호환성 문제를 피하기 위해 안정적인 22.04 버전을 사용합니다.
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Project
        run: mvn install -DskipTests

      - name: Install Playwright Browsers
        # 시스템 의존성을 자동으로 해결하며 브라우저를 설치합니다.
        run: mvn exec:java -e -Dexec.mainClass="com.microsoft.playwright.CLI" -Dexec.args="install --with-deps chromium"

      - name: Run Capture
        run: mvn exec:java -Dexec.mainClass="FinvizCapture"

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add screenshots/
          git commit -m "Daily update $(date)" || echo "No changes"
          git push
